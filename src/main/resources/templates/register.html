<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:350px;">
    <h3 class="text-center mb-3">Register</h3>

    <form th:action="@{/register}" method="post" th:object="${user}">
        <input type="text" th:field="*{username}" class="form-control mb-3" placeholder="Username" required>
        <input type="password" th:field="*{password}" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-success w-100">Register</button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/login}">Back to Login</a>
    </div>
</div>

</body>
</html>
